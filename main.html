<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circut Works</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Stop doing things the hard way.</h1>
        <p class="subtext">
            Show me what you're doing — I’ll tell you if it can be automated.
        </p>

        <p class="trust" >Free estimate. No pressure. No commitment.</p>

        <form>
            <label>What are you doing over and over right now?</label>
            <textarea rows="4" placeholder="Example: copying data between spreadsheets, renaming files, retyping info…"></textarea>


            <label>How often does this happen?</label>
            <select>
                <option>Daily</option>
                <option>Weekly</option>
                <option>Occasionally</option>
            </select>

            <label>Your email</label>
            <input type="email" placeholder="your@emailaddress.com">

            <label>Phone (optional)</label>
            <input type="tel" placeholder="Your phone number here">

            <label class="radio-option">
                <input type="radio" name="contact" value="text">
                <span>Text</span>
            </label>

            <label class="radio-option">
                <input type="radio" name="contact" value="call">
                <span>Call</span>
            </label>

            <label class="radio-option">
                <input type="radio" name="contact" value="Either one">
                <span>Both Options</span>
            </label>
            

            <button type="submit">See if this can be automated</button>
        </form>

        <p class="footer">
            I build simple tools to eliminate repetitive computer work.<br>
            <span class="local-tag">Local. Not a company.</span>
        </p>
    </div>
</body>
</html>
