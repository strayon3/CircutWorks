<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circut Works</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Stop doing things the hard way.</h1>
        <p class="subtext">
            Tell me what you're doing - I'll tell you if I can automate it.
        </p>

        <p class="trust" >Free estimate. No pressure.</p>

        <form>
            <label>What are you doing over and over?</label>
            <textarea rows="4" placeholder="Example: copying data between spreadsheets...."></textarea>

            <label>How often?</label>
            <select>
                <option>Daily</option>
                <option>Weekly</option>
                <option>Occasionally</option>
            </select>

            <label>Your email</label>
            <input type="email" placeholder="your@emailaddress.com">

            <button type="submit">Get a free estimate</button>
        </form>

        <p class="footer">
            I build tools to automate repetative computer tasks.<br>
            Local - not a company.
        </p>
    </div>
</body>
</html>
